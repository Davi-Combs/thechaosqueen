I<!DOCTYPE html>
<html>
<head>
<style>
  
  .page-container {
  background: #000;
  padding: 20px;
  min-height: 100vh;
}

.grid-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
  max-width: 1000px;
  margin: 0 auto;
}

  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    background: pink;
    border: 1px solid black;
    min-width: 0;
    overflow: hidden;
    min-height: 220px; /* was 150px */
    z-index:1;
    /* Giving them a good height so the sites aren't cut off*/


  
  }
  

  /* Makes iframes fill the pink boxes completely */
  
  .container iframe {
    width: 100%;
    height: 100%;
    border: none;
    z-index:1;
  }

  /* Makes the text in Item 4 bigger and easier to read */
  .container p {
    text-align: center;
    width: 100%;
    margin: 0;
    font-size: 20px; 
    font-weight: bold;
    z-index:1;
    
  }
  
.spider {
  position: fixed;
  top: 45px;
  left: -100px;
  width: 75px;
  height: 75px;
  z-index: 99;
  animation: walk 8s linear infinite;
}

@keyframes walk {
  from {
    left: -100px;
  }

  to {
    left: 100vw;
  }
}



</head>
  
</style>
